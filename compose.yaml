services:
  postgres:
    image: postgres:16-alpine
    container_name: qraven-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: qraven
    ports:
      - "5432:5432"
    volumes:
      - qraven_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: qraven-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - qraven_redis_data:/data

volumes:
  qraven_postgres_data:
  qraven_redis_data:
